<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Background: Desktop -->
  <rect width="800" height="500" fill="#1a1a2e"/>

  <!-- Taskbar -->
  <rect x="0" y="460" width="800" height="40" fill="#0f0f1a" stroke="#333" stroke-width="1"/>
  <rect x="8" y="468" width="80" height="24" rx="2" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="48" y="484" font-family="monospace" font-size="11" fill="#aaa" text-anchor="middle">START</text>
  <rect x="100" y="468" width="90" height="24" rx="2" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="145" y="484" font-family="monospace" font-size="10" fill="#ccc" text-anchor="middle">Terminal</text>

  <!-- Window 1: Terminal -->
  <rect x="40" y="40" width="420" height="280" fill="#0d0d0d" stroke="#555" stroke-width="2"/>
  <rect x="40" y="40" width="420" height="28" fill="#222" stroke="#555" stroke-width="1"/>
  <circle cx="58" cy="54" r="6" fill="#ff5f57"/>
  <circle cx="76" cy="54" r="6" fill="#febc2e"/>
  <circle cx="94" cy="54" r="6" fill="#28c840"/>
  <text x="130" y="59" font-family="monospace" font-size="11" fill="#888">Terminal — bash</text>
  <!-- Terminal content -->
  <text x="52" y="90" font-family="monospace" font-size="12" fill="#00ff41">user@webos:~$ ls</text>
  <text x="52" y="108" font-family="monospace" font-size="12" fill="#5af">Desktop/  Documents/  Downloads/</text>
  <text x="52" y="126" font-family="monospace" font-size="12" fill="#00ff41">user@webos:~$ cd Desktop</text>
  <text x="52" y="144" font-family="monospace" font-size="12" fill="#00ff41">user@webos:~/Desktop$ ls -la</text>
  <text x="52" y="162" font-family="monospace" font-size="12" fill="#5af">drwxr-xr-x  2 user 4096 Nov 18 readme.txt</text>
  <text x="52" y="180" font-family="monospace" font-size="12" fill="#5af">-rw-r--r--  1 user  256 Nov 18 notes.md</text>
  <text x="52" y="198" font-family="monospace" font-size="12" fill="#00ff41">user@webos:~/Desktop$ <tspan fill="#fff">_</tspan></text>
  <!-- AI correction example -->
  <text x="52" y="230" font-family="monospace" font-size="12" fill="#00ff41">user@webos:~$ lss</text>
  <text x="52" y="248" font-family="monospace" font-size="12" fill="#ffcc00">&#62; 명령어 "lss"을 "ls"로 교정할까요? (Y/N)</text>
  <text x="52" y="266" font-family="monospace" font-size="12" fill="#00ff41">$ Y</text>
  <text x="52" y="284" font-family="monospace" font-size="12" fill="#5af">Desktop/  Documents/  Downloads/</text>
  <text x="52" y="302" font-family="monospace" font-size="12" fill="#00ff41">user@webos:~$ <tspan fill="#fff">█</tspan></text>

  <!-- Window 2: File Explorer -->
  <rect x="300" y="140" width="340" height="260" fill="#1a1a1a" stroke="#555" stroke-width="2"/>
  <rect x="300" y="140" width="340" height="28" fill="#222" stroke="#555" stroke-width="1"/>
  <circle cx="318" cy="154" r="6" fill="#ff5f57"/>
  <circle cx="336" cy="154" r="6" fill="#febc2e"/>
  <circle cx="354" cy="154" r="6" fill="#28c840"/>
  <text x="390" y="159" font-family="monospace" font-size="11" fill="#888">File Explorer</text>
  <!-- File list -->
  <rect x="308" y="178" width="324" height="24" rx="2" fill="#2a2a2a"/>
  <text x="318" y="194" font-family="monospace" font-size="12" fill="#5af">📁 Desktop</text>
  <rect x="308" y="208" width="324" height="24" rx="2" fill="#333"/>
  <text x="318" y="224" font-family="monospace" font-size="12" fill="#aaa">📁 Documents</text>
  <rect x="308" y="238" width="324" height="24" rx="2" fill="#2a2a2a"/>
  <text x="318" y="254" font-family="monospace" font-size="12" fill="#aaa">📁 Downloads</text>
  <rect x="308" y="268" width="324" height="24" rx="2" fill="#333"/>
  <text x="318" y="284" font-family="monospace" font-size="12" fill="#ccc">📄 readme.txt</text>
  <rect x="308" y="298" width="324" height="24" rx="2" fill="#2a2a2a"/>
  <text x="318" y="314" font-family="monospace" font-size="12" fill="#ccc">📄 notes.md</text>

  <!-- Desktop icons -->
  <rect x="720" y="30" width="56" height="56" rx="4" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="748" y="58" font-family="monospace" font-size="20" text-anchor="middle" fill="#5af">⬛</text>
  <text x="748" y="100" font-family="monospace" font-size="10" fill="#aaa" text-anchor="middle">Terminal</text>
  <rect x="720" y="120" width="56" height="56" rx="4" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="748" y="148" font-family="monospace" font-size="20" text-anchor="middle" fill="#fc0">📁</text>
  <text x="748" y="190" font-family="monospace" font-size="10" fill="#aaa" text-anchor="middle">Files</text>
</svg>

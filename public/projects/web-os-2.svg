<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <!-- Background: Desktop -->
  <rect width="800" height="500" fill="#1a1a2e"/>

  <!-- Taskbar -->
  <rect x="0" y="460" width="800" height="40" fill="#0f0f1a" stroke="#333" stroke-width="1"/>
  <rect x="8" y="468" width="80" height="24" rx="2" fill="#222" stroke="#444" stroke-width="1"/>
  <text x="48" y="484" font-family="monospace" font-size="11" fill="#aaa" text-anchor="middle">START</text>
  <rect x="100" y="468" width="90" height="24" rx="2" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="145" y="484" font-family="monospace" font-size="10" fill="#ccc" text-anchor="middle">Terminal</text>
  <rect x="200" y="468" width="80" height="24" rx="2" fill="#333" stroke="#555" stroke-width="1"/>
  <text x="240" y="484" font-family="monospace" font-size="10" fill="#ccc" text-anchor="middle">Notepad</text>

  <!-- Window: Swagger API Docs -->
  <rect x="30" y="30" width="480" height="360" fill="#1e1e1e" stroke="#555" stroke-width="2"/>
  <rect x="30" y="30" width="480" height="28" fill="#222" stroke="#555" stroke-width="1"/>
  <circle cx="48" cy="44" r="6" fill="#ff5f57"/>
  <circle cx="66" cy="44" r="6" fill="#febc2e"/>
  <circle cx="84" cy="44" r="6" fill="#28c840"/>
  <text x="120" y="49" font-family="monospace" font-size="11" fill="#888">Swagger UI — Window API</text>
  <!-- Swagger content -->
  <rect x="38" y="66" width="464" height="36" fill="#1a3a5c"/>
  <text x="48" y="88" font-family="monospace" font-size="14" fill="#fff" font-weight="bold">Window API</text>
  <text x="48" y="102" font-family="monospace" font-size="10" fill="#8bc4e8">OS Window 상태 관리 REST API</text>
  <!-- GET endpoint -->
  <rect x="38" y="112" width="464" height="36" rx="2" fill="#1a2a1a"/>
  <rect x="38" y="112" width="50" height="36" rx="2" fill="#28a745"/>
  <text x="63" y="134" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">GET</text>
  <text x="100" y="134" font-family="monospace" font-size="11" fill="#aaa">/windows?username=</text>
  <text x="380" y="134" font-family="monospace" font-size="10" fill="#888">유저 윈도우 목록 조회</text>
  <!-- POST endpoint -->
  <rect x="38" y="154" width="464" height="36" rx="2" fill="#1a1a2e"/>
  <rect x="38" y="154" width="50" height="36" rx="2" fill="#1565c0"/>
  <text x="63" y="176" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">POST</text>
  <text x="100" y="176" font-family="monospace" font-size="11" fill="#aaa">/windows</text>
  <text x="380" y="176" font-family="monospace" font-size="10" fill="#888">윈도우 생성</text>
  <!-- PUT endpoint -->
  <rect x="38" y="196" width="464" height="36" rx="2" fill="#2a1a0a"/>
  <rect x="38" y="196" width="50" height="36" rx="2" fill="#e65100"/>
  <text x="63" y="218" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">PUT</text>
  <text x="100" y="218" font-family="monospace" font-size="11" fill="#aaa">/windows</text>
  <text x="380" y="218" font-family="monospace" font-size="10" fill="#888">위치·크기·zIndex 업데이트</text>
  <!-- DELETE endpoint -->
  <rect x="38" y="238" width="464" height="36" rx="2" fill="#2a1a1a"/>
  <rect x="38" y="238" width="58" height="36" rx="2" fill="#c62828"/>
  <text x="67" y="260" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">DELETE</text>
  <text x="108" y="260" font-family="monospace" font-size="11" fill="#aaa">/windows</text>
  <text x="380" y="260" font-family="monospace" font-size="10" fill="#888">윈도우 삭제</text>
  <!-- Response schema -->
  <rect x="38" y="284" width="464" height="98" rx="2" fill="#111"/>
  <text x="48" y="302" font-family="monospace" font-size="10" fill="#666">Response 200</text>
  <text x="48" y="320" font-family="monospace" font-size="11" fill="#ce9178">&#123;</text>
  <text x="64" y="336" font-family="monospace" font-size="11" fill="#9cdcfe">  "windowId"</text><text x="160" y="336" font-family="monospace" font-size="11" fill="#aaa">: </text><text x="172" y="336" font-family="monospace" font-size="11" fill="#ce9178">"win_001"</text>
  <text x="64" y="352" font-family="monospace" font-size="11" fill="#9cdcfe">  "zIndex"</text><text x="148" y="352" font-family="monospace" font-size="11" fill="#aaa">: </text><text x="160" y="352" font-family="monospace" font-size="11" fill="#b5cea8">5</text>
  <text x="64" y="368" font-family="monospace" font-size="11" fill="#9cdcfe">  "status"</text><text x="148" y="368" font-family="monospace" font-size="11" fill="#aaa">: </text><text x="160" y="368" font-family="monospace" font-size="11" fill="#ce9178">"created"</text>
  <text x="48" y="376" font-family="monospace" font-size="11" fill="#ce9178">&#125;</text>

  <!-- Window: Notepad (behind) -->
  <rect x="340" y="100" width="420" height="300" fill="#1a1a1a" stroke="#555" stroke-width="2"/>
  <rect x="340" y="100" width="420" height="28" fill="#222" stroke="#555" stroke-width="1"/>
  <circle cx="358" cy="114" r="6" fill="#ff5f57"/>
  <circle cx="376" cy="114" r="6" fill="#febc2e"/>
  <circle cx="394" cy="114" r="6" fill="#28c840"/>
  <text x="430" y="119" font-family="monospace" font-size="11" fill="#888">Notepad — dev-notes.md</text>
  <text x="352" y="150" font-family="monospace" font-size="12" fill="#569cd6"># Window API 개발 메모</text>
  <text x="352" y="170" font-family="monospace" font-size="11" fill="#888">zIndex 서버 자동 할당으로 변경</text>
  <text x="352" y="188" font-family="monospace" font-size="11" fill="#888">- SELECT MAX(zIndex) + 1</text>
  <text x="352" y="206" font-family="monospace" font-size="11" fill="#888">- 클라 경쟁조건 완전 제거</text>
  <text x="352" y="230" font-family="monospace" font-size="11" fill="#4ec9b0">Promise.all 병렬 처리 완료</text>
  <text x="352" y="248" font-family="monospace" font-size="11" fill="#888">SSE broadcast 연동 OK</text>
  <text x="352" y="266" font-family="monospace" font-size="11" fill="#888">Swagger 데코레이터 작성 완료</text>
</svg>
